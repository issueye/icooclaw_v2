# icooclaw 配置示例
# 将此文件复制为 config.toml 后按需修改

workspace = "./workspace"

[agent]
# 最近消息数量
recent_count = 5

[database]
# SQLite 数据库文件路径
path = "./workspace/data/icooclaw.db"

[gateway]
# 是否启用 HTTP 网关
enabled = true
# HTTP 网关端口
port = 16789

[gateway.security]
# local: 仅允许来自本机回环地址且来源可信的请求
# apikey: 要求提供 X-API-Key 或 Authorization: Bearer <key>
# open: 显式关闭网关鉴权
mode = "local"
# 当 mode = "apikey" 时必须填写
api_key = ""

[logging]
# 日志级别：debug、info、warn、error
level = "info"
# 日志格式：json、text
format = "json"
# 可选的日志文件输出路径；为空时仅输出到标准输出
path = "./workspace/logs/icooclaw.log"
# 是否包含源码文件和行号信息
add_source = false

[message_store]
# 消息存储类型：sqlite、json、markdown
type = "sqlite"
# json/markdown 模式下的索引根路径（按 session 拆分生成 json 文件，可选）
path = ""
# markdown 模式下消息 markdown 文件目录（可选）
dir = ""
